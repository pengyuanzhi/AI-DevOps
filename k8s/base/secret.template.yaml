# Secret template (DO NOT COMMIT actual secrets)
# Copy this file to secret.yaml and fill in the actual values
apiVersion: v1
kind: Secret
metadata:
  name: ai-cicd-secrets
  namespace: ai-cicd
type: Opaque
stringData:
  # LLM API Keys
  ANTHROPIC_API_KEY: "your_anthropic_api_key_here"
  CLAUDE_MODEL: "claude-3-5-sonnet-20241022"
  OPENAI_API_KEY: "your_openai_api_key_here"
  ZHIPU_API_KEY: "your_zhipu_api_key_here"
  ZHIPU_MODEL: "glm-4-plus"

  # Default LLM provider (claude, openai, zhipu)
  DEFAULT_LLM_PROVIDER: "zhipu"

  # GitLab configuration
  GITLAB_URL: "https://gitlab.com"
  GITLAB_TOKEN: "your_gitlab_token_here"
  GITLAB_WEBHOOK_SECRET: "your_webhook_secret_here_generate_random_string"

  # Database credentials
  POSTGRES_DB: "ai_cicd"
  POSTGRES_USER: "ai_cicd"
  POSTGRES_PASSWORD: "generate_secure_random_password_here"

  # Redis password
  REDIS_PASSWORD: "generate_secure_random_password_here"

  # RabbitMQ credentials
  RABBITMQ_USER: "ai_cicd"
  RABBITMQ_PASSWORD: "generate_secure_random_password_here"
  RABBITMQ_VHOST: "/"

---
# Alternatively, use TLS secret for ingress
apiVersion: v1
kind: Secret
metadata:
  name: ai-cicd-tls
  namespace: ai-cicd
type: kubernetes.io/tls
data:
  # Base64 encoded certificate and private key
  tls.crt: LS0tLS1CRUdJTi...
  tls.key: LS0tLS1CRUdJTi...
