# Kustomization for production overlays
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-cicd

resources:
  - ../base

# Production-specific patches
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 5
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "4Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2000m"
    target:
      kind: Deployment
      name: ai-cicd-api

  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 5
      - op: replace
        path: /spec/maxReplicas
        value: 20
    target:
      kind: HorizontalPodAutoscaler
      name: ai-cicd-api-hpa

  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 8
      - op: replace
        path: /spec/maxReplicas
        value: 50
    target:
      kind: HorizontalPodAutoscaler
      name: ai-cicd-worker-hpa

images:
  - name: ai-cicd
    newTag: "v1.0.0" # Replace with actual production image tag

# Production secrets (MUST be pre-created)
# kubectl create secret generic ai-cicd-secrets --from-env-file=production.env -n ai-cicd
