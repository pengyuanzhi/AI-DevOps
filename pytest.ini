# pytest配置文件

[pytest]
# 测试发现
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_

# 输出配置
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# 标记定义
markers =
    integration: 集成测试（需要数据库、Celery等）
    slow: 慢速测试（执行时间>1秒）
    requires_celery: 需要Celery worker
    requires_db: 需要数据库
    requires_websocket: 需要WebSocket服务器
    unit: 单元测试
    e2e: 端到端测试

# async配置
asyncio_mode = auto

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置（可选）
# addopts = --cov=src --cov-report=html --cov-report=term

# 测试目录
pythonpath = .

# 最小Python版本
minversion = 3.10
