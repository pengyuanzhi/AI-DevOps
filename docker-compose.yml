services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: ai-cicd-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ai_cicd}
      - POSTGRES_USER=${POSTGRES_USER:-ai_cicd}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ai_cicd_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_cicd}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ai-cicd-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ai-cicd-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ai-cicd-network

  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ai-cicd-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
      - RABBITMQ_DEFAULT_VHOST=${RABBITMQ_VHOST:-/}
      # RabbitMQ 3.12+ 需要这些配置
      - RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS=-rabbit log_levels [{connection,error},{default,warning}]
      - RABBITMQ_VM_MEMORY_HIGH_WATERMARK_RATIO=0.8
    ports:
      - "5672:5672"   # AMQP端口
      - "15672:15672" # 管理界面端口
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running", "-q"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ai-cicd-network

  # AI-CICD 主应用
  ai-cicd:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-cicd
    ports:
      - "8000:8000"
    environment:
      # LLM 配置
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-5-sonnet-20241022}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}

      # GitLab 配置
      - GITLAB_URL=${GITLAB_URL:-https://gitlab.com}
      - GITLAB_TOKEN=${GITLAB_TOKEN}
      - GITLAB_WEBHOOK_SECRET=${GITLAB_WEBHOOK_SECRET}

      # 服务配置
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - WORKERS=${WORKERS:-4}

      # 日志配置
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - DEBUG=${DEBUG:-false}

      # 环境配置
      - ENVIRONMENT=${ENVIRONMENT:-development}

      # 缓存配置
      - CACHE_TTL=${CACHE_TTL:-3600}

      # 数据库配置
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ai_cicd}:${POSTGRES_PASSWORD:-ai_cicd_password}@postgres:5432/${POSTGRES_DB:-ai_cicd}
      - DATABASE_POOL_SIZE=${DATABASE_POOL_SIZE:-10}
      - DATABASE_MAX_OVERFLOW=${DATABASE_MAX_OVERFLOW:-20}
      - DB_ECHO=${DB_ECHO:-false}

      # Redis 配置
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      - REDIS_MAX_CONNECTIONS=${REDIS_MAX_CONNECTIONS:-50}
      - REDIS_SOCKET_TIMEOUT=${REDIS_SOCKET_TIMEOUT:-5}
      - REDIS_SOCKET_CONNECT_TIMEOUT=${REDIS_SOCKET_CONNECT_TIMEOUT:-5}

      # RabbitMQ 配置
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/${RABBITMQ_VHOST:-/}
      - RABBITMQ_EXCHANGE=${RABBITMQ_EXCHANGE:-ai_cicd}

      # Celery 配置
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/2

      # 限流配置
      - MAX_REQUESTS_PER_MINUTE=${MAX_REQUESTS_PER_MINUTE:-60}
      - MAX_CONCURRENT_REVIEWS=${MAX_CONCURRENT_REVIEWS:-5}

      # 成本控制
      - DAILY_TOKEN_BUDGET=${DAILY_TOKEN_BUDGET:-1000000}
      - ENABLE_COST_TRACKING=${ENABLE_COST_TRACKING:-true}

      # 功能开关
      - ENABLE_TEST_GENERATION=${ENABLE_TEST_GENERATION:-true}
      - ENABLE_CODE_REVIEW=${ENABLE_CODE_REVIEW:-true}
      - ENABLE_PIPELINE_GENERATION=${ENABLE_PIPELINE_GENERATION:-false}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-cicd-network

  # Celery Worker
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-cicd-celery-worker
    command: celery -A src.tasks.celery_app worker --loglevel=info --queues=build,test,analysis,notification --concurrency=4
    environment:
      # LLM 配置
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-5-sonnet-20241022}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}

      # GitLab 配置
      - GITLAB_URL=${GITLAB_URL:-https://gitlab.com}
      - GITLAB_TOKEN=${GITLAB_TOKEN}
      - GITLAB_WEBHOOK_SECRET=${GITLAB_WEBHOOK_SECRET}

      # 服务配置
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - WORKERS=${WORKERS:-4}

      # 日志配置
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - DEBUG=${DEBUG:-false}

      # 环境配置
      - ENVIRONMENT=${ENVIRONMENT:-development}

      # 缓存配置
      - CACHE_TTL=${CACHE_TTL:-3600}

      # 数据库配置
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ai_cicd}:${POSTGRES_PASSWORD:-ai_cicd_password}@postgres:5432/${POSTGRES_DB:-ai_cicd}
      - DATABASE_POOL_SIZE=${DATABASE_POOL_SIZE:-10}
      - DATABASE_MAX_OVERFLOW=${DATABASE_MAX_OVERFLOW:-20}
      - DB_ECHO=${DB_ECHO:-false}

      # Redis 配置
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      - REDIS_MAX_CONNECTIONS=${REDIS_MAX_CONNECTIONS:-50}
      - REDIS_SOCKET_TIMEOUT=${REDIS_SOCKET_TIMEOUT:-5}
      - REDIS_SOCKET_CONNECT_TIMEOUT=${REDIS_SOCKET_CONNECT_TIMEOUT:-5}

      # RabbitMQ 配置
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/${RABBITMQ_VHOST:-/}
      - RABBITMQ_EXCHANGE=${RABBITMQ_EXCHANGE:-ai_cicd}

      # Celery 配置
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/2

      # 成本控制
      - DAILY_TOKEN_BUDGET=${DAILY_TOKEN_BUDGET:-1000000}
      - ENABLE_COST_TRACKING=${ENABLE_COST_TRACKING:-true}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ai-cicd-network

  # Celery Beat (定时任务调度器)
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-cicd-celery-beat
    command: celery -A src.tasks.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      # 数据库配置
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ai_cicd}:${POSTGRES_PASSWORD:-ai_cicd_password}@postgres:5432/${POSTGRES_DB:-ai_cicd}
      - DATABASE_POOL_SIZE=${DATABASE_POOL_SIZE:-10}
      - DATABASE_MAX_OVERFLOW=${DATABASE_MAX_OVERFLOW:-20}
      - DB_ECHO=${DB_ECHO:-false}

      # Redis 配置
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      - REDIS_MAX_CONNECTIONS=${REDIS_MAX_CONNECTIONS:-50}
      - REDIS_SOCKET_TIMEOUT=${REDIS_SOCKET_TIMEOUT:-5}
      - REDIS_SOCKET_CONNECT_TIMEOUT=${REDIS_SOCKET_CONNECT_TIMEOUT:-5}

      # Celery 配置
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/2

      # 日志配置
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - DEBUG=${DEBUG:-false}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-cicd-network

  # Frontend 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-cicd-frontend
    ports:
      - "80:80"
    depends_on:
      - ai-cicd
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ai-cicd-network
    restart: unless-stopped

networks:
  ai-cicd-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  data:
  logs:
