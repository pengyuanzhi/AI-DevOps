# ==========================================
# AI-CICD 生产环境 Docker Compose 配置
# ==========================================
# 使用方法：
#   docker compose -f docker-compose.prod.yml up -d
# ==========================================

version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: ai-cicd-postgres-prod
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ai_cicd}
      - POSTGRES_USER=${POSTGRES_USER:-ai_cicd}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./configs/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_cicd}"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai-cicd-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ai-cicd-redis-prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai-cicd-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ai-cicd-rabbitmq-prod
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-admin}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      - RABBITMQ_DEFAULT_VHOST=${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq_data_prod:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running", "-q"]
      interval: 60s
      timeout: 15s
      retries: 3
    networks:
      - ai-cicd-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # AI-CICD 后端服务
  backend:
    image: ${DOCKER_REGISTRY:-}ai-cicd-backend:${VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ai-cicd-backend-prod
    restart: always
    environment:
      # LLM 配置
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}

      # 数据库配置
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ai_cicd}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_cicd}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD}@rabbitmq:5672/

      # Celery 配置
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/2

      # 服务配置
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - WORKERS=${WORKERS:-4}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=production
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ai-cicd-network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Celery Worker
  celery-worker:
    image: ${DOCKER_REGISTRY:-}ai-cicd-backend:${VERSION:-latest}
    container_name: ai-cicd-celery-worker-prod
    restart: always
    command: celery -A src.tasks.celery_app worker --loglevel=info --queues=build,test,analysis,notification --concurrency=${CELERY_CONCURRENCY:-4}
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ai_cicd}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_cicd}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/2
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=production
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ai-cicd-network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Celery Beat (定时任务)
  celery-beat:
    image: ${DOCKER_REGISTRY:-}ai-cicd-backend:${VERSION:-latest}
    container_name: ai-cicd-celery-beat-prod
    restart: always
    command: celery -A src.tasks.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ai_cicd}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_cicd}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/2
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-cicd-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # 前端服务
  frontend:
    image: ${DOCKER_REGISTRY:-}ai-cicd-frontend:${VERSION:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: ai-cicd-frontend-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./configs/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai-cicd-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Prometheus 监控（可选）
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-cicd-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - ai-cicd-network
    profiles:
      - monitoring

  # Grafana 可视化（可选）
  grafana:
    image: grafana/grafana:latest
    container_name: ai-cicd-grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - ai-cicd-network
    profiles:
      - monitoring

networks:
  ai-cicd-network:
    driver: bridge

volumes:
  postgres_data_prod:
  redis_data_prod:
  rabbitmq_data_prod:
  prometheus_data:
  grafana_data:
